<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adhésion - ANDESAPS-MAC</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:0;
}

header{
background:#0b5e2b;
color:white;
text-align:center;
padding:30px;
}

.container{
max-width:700px;
margin:30px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
color:#0b5e2b;
text-align:center;
}

input,
select,
textarea{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#0b5e2b;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#145c43;
}

footer{
background:#0b5e2b;
color:white;
text-align:center;
padding:15px;
margin-top:30px;
}

</style>

</head>

<body>

<header>

<h1>Formulaire d'Adhésion</h1>

<p>Rejoignez l'ANDESAPS-MAC</p>

</header>

<div class="container">

<h2>Informations du Membre</h2>

<form>

<label>Nom Complet</label>
<input type="text" placeholder="Votre nom complet">

<label>Téléphone</label>
<input type="tel" placeholder="+243">

<label>Email</label>
<input type="email" placeholder="Votre email">

<label>Province</label>
<input type="text" placeholder="Votre province">

<label>Ville</label>
<input type="text" placeholder="Votre ville">

<label>Profession</label>
<input type="text" placeholder="Votre profession">

<label>Catégorie de membre</label>

<select>

<option>Membre Fondateur</option>

<option>Membre Effectif</option>

<option>Membre Adhérent</option>

<option>Membre Bienfaiteur</option>

<option>Membre Partenaire</option>

<option>Membre d'Honneur</option>

</select>

<label>Motivation</label>

<textarea rows="5"
placeholder="Pourquoi souhaitez-vous rejoindre l'ANDESAPS-MAC ?">
</textarea>

<button type="submit">

Soumettre la Demande

</button>

</form>

</div>

<footer>

<p>ANDESAPS-MAC</p>

<p>Travail • Solidarité • Développement • Paix</p>

</footer>

</body>
</html>
